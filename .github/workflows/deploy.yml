name: Hymn Scanner Docker Deploy

on:
  push:
    branches: ["master"]

jobs:
  build-docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/hymn-scanner-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/hymn-scanner-frontend:latest

  deploy-to-vps:
    needs: build-docker
    runs-on: self-hosted

    steps:
      - name: Fix workspace perms
        run: sudo chown -R $USER:$USER ${{ github.workspace }} || true

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Pull and Restart Docker Containers
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        run: |
          docker compose pull
          docker compose up -d
      
      
