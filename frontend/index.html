<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hymn Page Scanner</title>
</head>
<body class="custom-scrollbar min-h-screen text-[10pt] text-text font-[Segoe_UI] bg-app-bg">
  
  <div id="app" class="max-w-[900px] w-full mx-auto pb-8 md:min-w-[700px] min-w-[320px]">
    <div class="px-5 py-[18px] pb-[6px] flex justify-between items-center">
      <h1 class="text-gold text-[18pt] font-bold">🎵 Hymn Page Scanner</h1>
    </div>

    <!-- File Pickers Card -->
    <div class="card mx-5 my-[6px] p-4 flex flex-col gap-3">
      <div class="flex flex-col md:flex-row md:items-center gap-2">
        <label class="md:w-32 text-subtext md:text-right font-medium">Hymn PDF:</label>
        <div class="flex flex-1 items-center gap-2">
            <input type="file" id="pdfFileInput" accept="application/pdf" class="hidden" />
            <input type="text" id="pdfFileName" readonly class="flex-1 bg-log-bg border border-secondary text-text px-3 py-1.5 focus:outline-none" placeholder="Select a PDF..." />
            <button id="btnBrowsePdf" class="bg-secondary text-text hover:bg-accent border border-secondary px-[14px] py-[5px] font-bold cursor-pointer transition-colors whitespace-nowrap">Browse</button>
        </div>
      </div>

      <div class="flex flex-col md:flex-row md:items-center gap-2">
        <label class="md:w-32 text-subtext md:text-right font-medium">Lineup (Img):</label>
        <div class="flex flex-1 items-center gap-2">
            <input type="file" id="lineupFileInput" accept="image/*" class="hidden" />
            <input type="text" id="lineupFileName" readonly class="flex-1 bg-log-bg border border-secondary text-text px-3 py-1.5 focus:outline-none" placeholder="Select schedule image..." />
            <button id="btnBrowseLineup" class="bg-secondary text-text hover:bg-accent border border-secondary px-[14px] py-[5px] font-bold cursor-pointer transition-colors whitespace-nowrap">Browse</button>
        </div>
      </div>

      <div class="flex items-center gap-2 mt-2">
        <div class="hidden md:block w-32"></div>
        <button id="btnParse" class="bg-secondary text-text hover:bg-accent border border-solid border-gold px-[20px] py-[8px] font-bold cursor-pointer transition-colors rounded-sm shadow-sm ring-1 ring-gold/20">Load & Parse Lineup</button>
        <span id="parseStatus" class="text-[9pt] italic text-subtext ml-3"></span>
      </div>
    </div>

    <!-- Parsed Schedule Preview -->
    <div class="mx-5 mt-6 mb-[6px]">
      <h2 class="text-text mb-3 text-[14pt] font-semibold flex items-center gap-2">
        <span class="text-gold text-lg">📁</span> Parsed Schedule
      </h2>
      <div class="overflow-x-auto custom-scrollbar border border-gold bg-log-bg rounded-sm" id="scheduleContainer">
        <table id="scheduleTable" class="w-full text-center text-[10pt] border-collapse min-w-[600px]">
          <thead>
            <tr>
               <th id="scheduleMainTitle" colspan="100" class="py-3 border-b border-gold font-bold text-[12pt]">Schedule Lineup</th>
            </tr>
            <tr id="scheduleHead" class="text-gold bg-surface">
              <!-- Rendered via JS -->
            </tr>
          </thead>
          <tbody id="scheduleBody">
              <!-- Rendered via JS -->
          </tbody>
          <tfoot id="scheduleFoot" class="font-bold text-gold bg-surface">
              <!-- Rendered via JS for Offering and Recessional -->
          </tfoot>
        </table>
      </div>
    </div>

    <!-- Scan Configuration -->
    <div class="mx-5 mt-8 mb-[6px]">
      <h2 class="text-text text-[14pt] font-semibold mb-1">Scan Configuration</h2>
      <p class="text-subtext text-[10pt] mb-4">Select columns to scan from dates</p>
      
      <div class="card p-0 flex flex-col mb-4 overflow-hidden rounded-sm">
         <div class="bg-log-bg border-b border-secondary py-2 px-4 font-bold text-center" id="scanConfigTitle">Selected Dates</div>
         
         <!-- Desktop view for dates -->
         <div id="desktopDateTabs" class="hidden md:flex flex-row overflow-x-auto custom-scrollbar">
            <!-- Rendered via JS -->
         </div>
         
         <!-- Mobile view for dates -->
         <div class="md:hidden p-4 bg-app-bg">
             <label class="block text-subtext mb-2">Select Date:</label>
             <select id="mobileDateSelect" class="w-full bg-log-bg border border-secondary text-text py-2 px-3 focus:border-gold focus:outline-none">
                 <option value="" disabled selected>Add a date...</option>
                 <!-- Rendered via JS -->
             </select>
             
             <!-- Chips for selected dates on mobile -->
             <div id="mobileSelectedChips" class="flex flex-wrap gap-2 mt-3">
             </div>
         </div>
      </div>

      <div class="card p-4 flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
        <div class="flex flex-col gap-3 w-full md:w-3/5">
          <div class="flex flex-col md:flex-row md:items-center gap-2">
            <label class="text-subtext md:w-[100px] font-medium">Selected:</label>
            <input type="text" id="selectedDates" readonly class="flex-1 bg-log-bg border border-secondary text-gold px-3 py-1.5 font-bold" />
          </div>
          <div class="flex flex-col md:flex-row md:items-center gap-2">
            <label class="text-subtext md:w-[100px] font-medium">Manual:</label>
            <input type="text" id="manualInput" class="flex-1 bg-log-bg border border-secondary text-text px-3 py-1.5 focus:outline-none focus:border-gold" placeholder="e.g. 52, CH23, 1A" />
          </div>
        </div>
        
        <button id="btnScan" class="w-full md:w-auto bg-surface text-gold hover:bg-secondary hover:text-white border-2 border-gold px-[36px] py-[14px] text-[13pt] font-bold cursor-pointer transition-all self-stretch md:self-end rounded-sm" disabled>SCAN PAGES</button>
      </div>
    </div>

    <!-- Results Block -->
    <div class="card mx-5 my-[12px] p-5 flex items-center gap-5 bg-surface border-secondary relative overflow-hidden">
      <div class="absolute top-0 left-0 w-1 h-full bg-gold"></div>
      <div class="w-16 md:w-20 text-center">
        <div class="text-[28pt] text-gold mb-1 leading-none">⎙</div>
        <div id="scanStatus" class="text-subtext text-[10pt] font-bold tracking-widest">READY</div>
      </div>
      <div class="flex-1 border-l border-secondary pl-5">
        <div class="text-[14pt] font-bold text-success mb-3 break-words" id="resultText">—</div>
        <div class="flex flex-wrap gap-3">
          <button id="btnCopy" class="bg-log-bg text-subtext hover:text-gold hover:border-gold border border-secondary px-4 py-1.5 cursor-pointer transition-colors shadow-sm" disabled>Copy</button>
          <button id="btnPrint" class="bg-log-bg text-subtext hover:text-gold hover:border-gold border border-secondary px-4 py-1.5 cursor-pointer transition-colors shadow-sm" disabled>Print File...</button>
          <button id="btnSave" class="bg-log-bg text-subtext hover:text-gold hover:border-gold border border-secondary px-4 py-1.5 cursor-pointer transition-colors shadow-sm" disabled>Save PDF...</button>
        </div>
      </div>
    </div>

    <!-- Log Viewer -->
    <div class="mx-5 mt-[16px]">
      <div class="flex justify-between items-end mb-1">
        <h3 class="text-subtext font-bold">Execution Log</h3>
        <button id="btnClearLog" class="text-subtext text-[9pt] hover:text-gold cursor-pointer bg-transparent border-none">Clear Log</button>
      </div>
      <div class="bg-log-bg text-[10pt] font-[Consolas] p-3 border border-secondary log-viewer overflow-y-auto h-[240px] rounded-sm" id="logContainer">
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
